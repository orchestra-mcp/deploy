# =============================================================================
# Kong Declarative Configuration — Orchestra MCP Platform
#
# This file configures Kong as the Supabase API gateway in DB-less mode.
# Kong routes requests to PostgREST, GoTrue, Realtime, Storage, and Meta
# based on URL path prefixes, and enforces key-auth + ACL for access control.
#
# Consumers:
#   - anon: Uses ANON_KEY, can access public endpoints
#   - service_role: Uses SERVICE_ROLE_KEY, can access all endpoints
#
# Mount path: /var/lib/kong/kong.yml
# =============================================================================

_format_version: "2.1"
_transform: true

# ─── Consumers ───────────────────────────────────────────────────────────────

consumers:
  - username: anon
    keyauth_credentials:
      - key: ${ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY}

# ─── ACL Groups ─────────────────────────────────────────────────────────────

# anon consumer belongs to the "anon" group
# service_role consumer belongs to both "anon" and "admin" groups

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: anon
  - consumer: service_role
    group: admin

# ─── Services & Routes ──────────────────────────────────────────────────────

services:

  # ── GoTrue (Auth) ────────────────────────────────────────────────────────

  - name: auth-v1-open
    url: http://supabase-auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors

  - name: auth-v1-open-callback
    url: http://supabase-auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors

  - name: auth-v1-open-authorize
    url: http://supabase-auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors

  - name: auth-v1
    url: http://supabase-auth:9999
    routes:
      - name: auth-v1
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

  # ── PostgREST (REST API) ─────────────────────────────────────────────────

  - name: rest-v1
    url: http://supabase-rest:3000/
    routes:
      - name: rest-v1
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

  # ── GraphQL (PostgREST /rpc endpoint) ────────────────────────────────────

  - name: graphql-v1
    url: http://supabase-rest:3000/rpc
    routes:
      - name: graphql-v1
        strip_path: true
        paths:
          - /graphql/v1
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

  # ── Realtime ─────────────────────────────────────────────────────────────

  - name: realtime-v1
    url: http://supabase-realtime:4000/socket/
    routes:
      - name: realtime-v1
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

  - name: realtime-v1-ws
    url: http://supabase-realtime:4000/socket/
    routes:
      - name: realtime-v1-ws
        strip_path: true
        paths:
          - /realtime/v1/
        protocols:
          - http
          - https
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

  # ── Storage ──────────────────────────────────────────────────────────────

  - name: storage-v1
    url: http://supabase-storage:5000/
    routes:
      - name: storage-v1
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

  # ── Storage: Public object access (no auth required) ─────────────────────

  - name: storage-v1-s3
    url: http://supabase-storage:5000/object/public
    routes:
      - name: storage-v1-s3
        strip_path: true
        paths:
          - /storage/v1/s3/
    plugins:
      - name: cors

  - name: storage-v1-object-public
    url: http://supabase-storage:5000/object/public/
    routes:
      - name: storage-v1-object-public
        strip_path: true
        paths:
          - /object/public/
    plugins:
      - name: cors

  # ── Postgres Meta (Admin) ────────────────────────────────────────────────

  - name: meta
    url: http://supabase-meta:8080/
    routes:
      - name: meta
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

  # ── MCP Server (Model Context Protocol) ─────────────────────────────────
  # Serves Studio's built-in MCP endpoint for AI coding assistants.
  # Protected by service_role key auth (admin ACL) instead of IP restriction
  # so it can be accessed remotely through Caddy.

  - name: mcp
    url: http://supabase-studio:3000/api/mcp
    routes:
      - name: mcp
        strip_path: true
        paths:
          - /mcp
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
