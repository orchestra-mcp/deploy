# =============================================================================
# Orchestra MCP Platform — Docker Compose (Self-Hosted)
# Domain: orchestra-mcp.dev
#
# This is the SINGLE deployment repo. Pull it and run:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
#   docker compose logs -f
#
# Architecture:
#   Caddy (reverse proxy + TLS) -> Kong (API gateway) -> Supabase services
#                                -> Gateway (Go API + MCP)
#                                -> Next.js (frontend)
# =============================================================================

name: orchestra

# ─── Networks ────────────────────────────────────────────────────────────────

networks:
  orchestra:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local

# ─── Services ────────────────────────────────────────────────────────────────

services:

  # ── Supabase: PostgreSQL ─────────────────────────────────────────────────

  supabase-db:
    image: supabase/postgres:17.6.1.101
    container_name: orchestra-supabase-db
    restart: unless-stopped
    networks:
      orchestra:
        aliases:
          - db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./docker/postgres/run-migrations.sh:/docker-entrypoint-initdb.d/99-run-migrations.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Supabase: GoTrue (Auth) ──────────────────────────────────────────────

  supabase-auth:
    image: supabase/gotrue:v2.188.1
    container_name: orchestra-supabase-auth
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: https://orchestra-mcp.dev
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST:-}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-false}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      API_EXTERNAL_URL: https://auth.orchestra-mcp.dev
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_SMS_AUTOCONFIRM: ${GOTRUE_SMS_AUTOCONFIRM:-true}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-noreply@orchestra-mcp.dev}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Orchestra MCP}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_AUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: https://auth.orchestra-mcp.dev/callback
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${GITHUB_AUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI: https://auth.orchestra-mcp.dev/callback
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Supabase: PostgREST ──────────────────────────────────────────────────

  supabase-rest:
    image: postgrest/postgrest:v14.7
    container_name: orchestra-supabase-rest
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    command: postgrest
    healthcheck:
      test: ["CMD", "postgrest", "--ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Supabase: Realtime ───────────────────────────────────────────────────

  supabase-realtime:
    image: supabase/realtime:v2.78.16
    container_name: orchestra-supabase-realtime
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: ${REALTIME_DB_ENC_KEY:-supabaserealtime}
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE}
      ERL_AFLAGS: "-proto_dist inet_tcp"
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      SECURE_CHANNELS: "true"
      SLOT_NAME: supabase_realtime_rls
      TEMPORARY_SLOT: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "printf \\\\0 > /dev/tcp/localhost/4000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Supabase: Storage ────────────────────────────────────────────────────

  supabase-storage:
    image: supabase/storage-api:v1.44.9
    container_name: orchestra-supabase-storage
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      POSTGREST_URL: http://supabase-rest:3000
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      STORAGE_PUBLIC_URL: https://storage.orchestra-mcp.dev
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: us-east-1
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage_data:/var/lib/storage
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/status', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Supabase: Postgres Meta ──────────────────────────────────────────────

  supabase-meta:
    image: supabase/postgres-meta:v0.96.1
    container_name: orchestra-supabase-meta
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Supabase: Kong (API Gateway) ─────────────────────────────────────────

  supabase-kong:
    image: kong/kong:3.9.1
    container_name: orchestra-supabase-kong
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_started
      supabase-realtime:
        condition: service_started
      supabase-storage:
        condition: service_started
      supabase-meta:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      # Keys passed as env vars — used by entrypoint to envsubst kong.yml
      ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml.template:ro
      - ./docker/kong/entrypoint.sh:/usr/local/bin/kong-entrypoint.sh:ro
    entrypoint: /usr/local/bin/kong-entrypoint.sh
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Supabase: Studio (Dashboard) ─────────────────────────────────────────

  supabase-studio:
    image: supabase/studio:2026.03.16-sha-5528817
    container_name: orchestra-supabase-studio
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-meta:
        condition: service_started
      supabase-analytics:
        condition: service_healthy
    environment:
      STUDIO_DEFAULT_ORGANIZATION: Orchestra
      STUDIO_DEFAULT_PROJECT: orchestra-mcp
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: https://db.orchestra-mcp.dev
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DEFAULT_ORGANIZATION_NAME: Orchestra
      DEFAULT_PROJECT_NAME: orchestra-mcp
      # Database connection details (Studio encrypts password with CRYPTO_KEY for meta)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      EDGE_RUNTIME_ENDPOINT: http://supabase-edge:9999
      # Edge functions management (Studio reads function list from this volume)
      EDGE_FUNCTIONS_MANAGEMENT_FOLDER: /app/edge-functions
      SNIPPETS_MANAGEMENT_FOLDER: /app/snippets
      # Analytics (Logflare) — enables Logs Explorer in Studio
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
      LOGFLARE_URL: http://supabase-analytics:4000
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      # Studio auth credentials (basic auth at Caddy level + Studio internal)
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./supabase/snippets:/app/snippets
      - ./supabase/functions:/app/edge-functions:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/profile', (r) => { process.exit(r.statusCode < 500 ? 0 : 1) })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Supabase: Edge Runtime (Deno Functions) ──────────────────────────────

  supabase-edge:
    image: supabase/edge-runtime:v1.73.0
    container_name: orchestra-supabase-edge
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      VERIFY_JWT: "true"
      # Edge function secrets
      MCP_JWT_SECRET: ${MCP_JWT_SECRET:-}
      BMAC_WEBHOOK_SECRET: ${BMAC_WEBHOOK_SECRET:-}
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
    command: start --main-service /home/deno/functions/main

  # NOTE: Supabase MCP Server (@supabase/mcp) runs as a local Node.js process,
  # not as a Docker container. Install with: npx @supabase/mcp@latest

  # ── imgproxy (Storage image transformations) ──────────────────────────────

  imgproxy:
    image: darthsim/imgproxy:v3.31.1
    container_name: orchestra-imgproxy
    restart: unless-stopped
    networks: [orchestra]
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage_data:/var/lib/storage
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Supavisor (Connection Pooler) ─────────────────────────────────────────

  supavisor:
    image: supabase/supavisor:2.7.4
    container_name: orchestra-supavisor
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/_supabase
      CLUSTER_POSTGRES: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      VAULT_ENC_KEY: ${VAULT_ENC_KEY}
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      REGION: local
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: supavisor
      PORT: 4000
      ERL_AFLAGS: "-proto_dist inet_tcp"
    healthcheck:
      test: ["CMD", "bash", "-c", "printf \\\\0 > /dev/tcp/localhost/4000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Supabase: Analytics (Logflare) ────────────────────────────────────────
  # Required for Studio Logs Explorer. Ingests structured logs from Vector.

  supabase-analytics:
    image: supabase/logflare:1.31.2
    container_name: orchestra-supabase-analytics
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: _supabase
      DB_HOSTNAME: db
      DB_PORT: 5432
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_PUBLIC_ACCESS_TOKEN: ${LOGFLARE_API_KEY}
      LOGFLARE_PRIVATE_ACCESS_TOKEN: ${LOGFLARE_API_KEY}
      LOGFLARE_SINGLE_TENANT: "true"
      LOGFLARE_SUPABASE_MODE: "true"
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@db:5432/_supabase
      POSTGRES_BACKEND_SCHEMA: _analytics
    healthcheck:
      test: ["CMD", "bash", "-c", "printf \\\\0 > /dev/tcp/localhost/4000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Vector (Log Collection Pipeline) ────────────────────────────────────
  # Collects Docker container logs and routes them to Logflare analytics.

  vector:
    image: timberio/vector:0.53.0-alpine
    container_name: orchestra-vector
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-analytics:
        condition: service_healthy
    volumes:
      - ./vector/vector.yml:/etc/vector/vector.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LOGFLARE_PUBLIC_ACCESS_TOKEN: ${LOGFLARE_API_KEY}
    command: ["--config", "/etc/vector/vector.yml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── ClickHouse (Analytics) ────────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    container_name: orchestra-clickhouse
    restart: unless-stopped
    networks: [orchestra]
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/orchestra.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/orchestra.xml
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: orchestra_analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-orchestra}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Orchestra: Gateway (Unified Go API + MCP) ───────────────────────────
  # Source: apps/gateway/ — handles both api. and mcp. subdomains.
  # Serves REST API, WebSocket tunnels, and Streamable HTTP MCP transport.
  # When deploying standalone, use a pre-built image:
  #   gateway:
  #     image: ghcr.io/orchestra-mcp/gateway:latest

  gateway:
    image: ${GATEWAY_IMAGE:-ghcr.io/orchestra-mcp/gateway:latest}
    container_name: orchestra-gateway
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://orchestra-mcp.dev,https://mcp.orchestra-mcp.dev}
      WEB_API_BASE_URL: ${WEB_API_BASE_URL:-https://api.orchestra-mcp.dev}
      UPLOAD_DIR: /data/uploads
      PORT: 8080
      ENVIRONMENT: production
    volumes:
      - storage_data:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Orchestra: Next.js (Frontend) ────────────────────────────────────────
  # When deploying standalone, use a pre-built image:
  #   nextjs:
  #     image: ghcr.io/orchestra-mcp/web:latest

  nextjs:
    image: ${NEXTJS_IMAGE:-caddy:2.11.2-alpine}
    container_name: orchestra-nextjs
    restart: unless-stopped
    networks: [orchestra]
    depends_on:
      supabase-kong:
        condition: service_healthy
      gateway:
        condition: service_healthy
    command: caddy respond --listen :3000 "Orchestra MCP — coming soon" 200
    environment:
      NEXT_PUBLIC_SUPABASE_URL: https://rest.orchestra-mcp.dev
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_GATEWAY_URL: https://api.orchestra-mcp.dev
      NEXT_PUBLIC_MCP_URL: https://mcp.orchestra-mcp.dev
      NEXT_PUBLIC_AUTH_URL: https://auth.orchestra-mcp.dev
      NEXT_PUBLIC_REALTIME_URL: https://realtime.orchestra-mcp.dev
      NEXT_PUBLIC_STORAGE_URL: https://storage.orchestra-mcp.dev
      NODE_ENV: production
      PORT: 3000

  # ── Caddy (Reverse Proxy + TLS) ──────────────────────────────────────────

  caddy:
    build:
      context: ./docker/caddy
      dockerfile: Dockerfile
    container_name: orchestra-caddy
    restart: unless-stopped
    networks: [orchestra]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      supabase-kong:
        condition: service_healthy
      supabase-studio:
        condition: service_started
      supabase-auth:
        condition: service_healthy
      supabase-realtime:
        condition: service_started
      supabase-storage:
        condition: service_started
      supabase-edge:
        condition: service_started
      gateway:
        condition: service_healthy
      nextjs:
        condition: service_started
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-orchestra}
      DASHBOARD_PASSWORD_HASH: ${DASHBOARD_PASSWORD_HASH}
      CLICKHOUSE_ADMIN_USER: ${CLICKHOUSE_ADMIN_USER:-admin}
      CLICKHOUSE_ADMIN_HASH: ${CLICKHOUSE_ADMIN_HASH}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
