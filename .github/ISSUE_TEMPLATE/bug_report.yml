name: Bug Report
description: Report a bug with the deployment or a service
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.

  - type: dropdown
    id: service
    attributes:
      label: Affected Service
      options:
        - Caddy (reverse proxy)
        - PostgreSQL (supabase-db)
        - GoTrue (auth)
        - PostgREST (rest API)
        - Realtime
        - Storage
        - Edge Runtime
        - Kong (API gateway)
        - Studio (dashboard)
        - ClickHouse (analytics)
        - Supavisor (connection pooler)
        - Gateway (Go API)
        - Next.js (frontend)
        - Migrations
        - Docker Compose
        - setup-server.sh
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `docker compose up -d`
        2. Visit https://db.orchestra-mcp.dev
        3. See error...

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste `docker compose logs <service>` output
      render: shell

  - type: input
    id: os
    attributes:
      label: Server OS
      placeholder: Ubuntu 22.04 / Debian 12 / etc.

  - type: input
    id: docker-version
    attributes:
      label: Docker Version
      placeholder: Docker 27.x / Compose v2.x
